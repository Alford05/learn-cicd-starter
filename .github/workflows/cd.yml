name: cd

on: 
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy 
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: buildprod.sh
        run: ./scripts/buildprod.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json:  '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: Build and push Docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/cosmic-dialect-490212-m5/notely-ar-repo/notely:latest .
      
      - name: Deploy to Cloud run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/cosmic-dialect-490212-m5/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project cosmic-dialect-490212-m5 --max-instances=4
        
  