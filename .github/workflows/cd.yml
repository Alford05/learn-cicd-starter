name: cd

on: 
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy 
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: buildprod.sh
        run: ./scripts/buildprod.sh

      

  
  