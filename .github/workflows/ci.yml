name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Force Success 
        run: go test ./... -cover
  
  style:
      name: Style
      runs-on: ubuntu-latest

      steps:
        - name: check out code
          uses: actions/checkout@v4

        - name: set up Go
          uses: actions/setup-go@v5
          with:
            go-version: "1.26.0"

        - name: run the formatting check
          run: test -z $(go fmt ./...)



